<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Eduba{% endblock %}</title>
    {% block extra_styles%}{% endblock %}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header>
        <div class="logo">
            <img src="{{ url_for('static', filename='./resources/images/logo.png') }}" alt="Eduba Logo" srcset="/static/resources/images/logo.png 1x, /static/resources/images/logo@2x.png 2x">
        </div>
        
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
    <footer>
        <p>&copy; 2025 Eduba</p>
    </footer>

    <script src="{{ url_for('static', filename='./scripts/script.js') }}"></script>
</body>
</html>
